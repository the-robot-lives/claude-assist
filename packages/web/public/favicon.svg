<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E0E12"/>
      <stop offset="100%" stop-color="#16161C"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect width="32" height="32" rx="7" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.3"/>
  <!-- Chat bubble / thread lines — three stacked conversation bars -->
  <rect x="6" y="8" width="14" height="3" rx="1.5" fill="url(#glow)"/>
  <rect x="6" y="14" width="10" height="3" rx="1.5" fill="url(#glow)" opacity="0.6"/>
  <rect x="6" y="20" width="12" height="3" rx="1.5" fill="url(#glow)" opacity="0.35"/>
  <!-- Search lens -->
  <circle cx="22.5" cy="19.5" r="4" fill="none" stroke="#06B6D4" stroke-width="2"/>
  <line x1="25.3" y1="22.3" x2="28" y2="25" stroke="#06B6D4" stroke-width="2" stroke-linecap="round"/>
</svg>
