<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <style>
      .ui { font-family: Inter, system-ui, sans-serif; }
      .mono { font-family: JetBrains Mono, monospace; }
    </style>
  </defs>

  <!-- Canvas -->
  <rect width="1280" height="800" fill="#0F0F14"/>

  <!-- ==================== NAVBAR (56px) ==================== -->
  <rect x="0" y="0" width="1280" height="56" fill="#18181F"/>
  <line x1="0" y1="56" x2="1280" y2="56" stroke="#2A2A3A" stroke-width="1"/>

  <!-- Logo mark -->
  <rect x="20" y="16" width="24" height="24" rx="6" fill="#06B6D4" opacity="0.9"/>
  <text x="27" y="33" class="mono" font-size="14" font-weight="700" fill="#0F0F14" text-anchor="middle">C</text>

  <!-- App name -->
  <text x="52" y="34" class="ui" font-size="15" font-weight="600" fill="#CDCDE0">claude-assist</text>

  <!-- Search bar (center-right) -->
  <rect x="860" y="14" width="280" height="28" rx="6" fill="#22222E" stroke="#2A2A3A" stroke-width="1"/>
  <text x="878" y="33" class="ui" font-size="12" fill="#5C5C72">Search threads, tags, content...</text>
  <text x="1118" y="33" class="mono" font-size="10" fill="#5C5C72" text-anchor="end">&#x2318;K</text>

  <!-- Index status -->
  <circle cx="1180" cy="28" r="4" fill="#06B6D4" opacity="0.7"/>
  <text x="1190" y="32" class="ui" font-size="11" fill="#5C5C72">Indexed</text>

  <!-- ==================== SIDEBAR (220px) ==================== -->
  <rect x="0" y="56" width="220" height="744" fill="#18181F"/>
  <line x1="220" y1="56" x2="220" y2="800" stroke="#2A2A3A" stroke-width="1"/>

  <!-- Sidebar section label -->
  <text x="20" y="88" class="ui" font-size="11" font-weight="600" fill="#5C5C72" letter-spacing="0.5">NAVIGATION</text>

  <!-- Sidebar items -->
  <!-- Dashboard -->
  <rect x="8" y="100" width="204" height="34" rx="6" fill="transparent"/>
  <text x="40" y="122" class="ui" font-size="13" fill="#7A7A94">Dashboard</text>
  <!-- icon placeholder -->
  <rect x="16" y="109" width="16" height="16" rx="3" fill="none" stroke="#5C5C72" stroke-width="1.2"/>

  <!-- Browse — active -->
  <rect x="8" y="138" width="204" height="34" rx="6" fill="rgba(6,182,212,0.08)"/>
  <rect x="8" y="138" width="3" height="34" rx="1" fill="#06B6D4"/>
  <text x="40" y="160" class="ui" font-size="13" font-weight="500" fill="#06B6D4">Browse</text>
  <rect x="16" y="147" width="16" height="16" rx="3" fill="none" stroke="#06B6D4" stroke-width="1.2"/>

  <!-- Tags -->
  <rect x="8" y="176" width="204" height="34" rx="6" fill="transparent"/>
  <text x="40" y="198" class="ui" font-size="13" fill="#7A7A94">Tags</text>
  <rect x="16" y="185" width="16" height="16" rx="3" fill="none" stroke="#5C5C72" stroke-width="1.2"/>

  <!-- Projects -->
  <rect x="8" y="214" width="204" height="34" rx="6" fill="transparent"/>
  <text x="40" y="236" class="ui" font-size="13" fill="#7A7A94">Projects</text>
  <rect x="16" y="223" width="16" height="16" rx="3" fill="none" stroke="#5C5C72" stroke-width="1.2"/>

  <!-- Insights -->
  <rect x="8" y="252" width="204" height="34" rx="6" fill="transparent"/>
  <text x="40" y="274" class="ui" font-size="13" fill="#7A7A94">Insights</text>
  <rect x="16" y="261" width="16" height="16" rx="3" fill="none" stroke="#5C5C72" stroke-width="1.2"/>

  <!-- Settings -->
  <rect x="8" y="290" width="204" height="34" rx="6" fill="transparent"/>
  <text x="40" y="312" class="ui" font-size="13" fill="#7A7A94">Settings</text>
  <rect x="16" y="299" width="16" height="16" rx="3" fill="none" stroke="#5C5C72" stroke-width="1.2"/>

  <!-- Sidebar: recent threads -->
  <text x="20" y="360" class="ui" font-size="11" font-weight="600" fill="#5C5C72" letter-spacing="0.5">RECENT THREADS</text>

  <text x="20" y="386" class="ui" font-size="12" fill="#9898B0">Phoenix LiveView auth</text>
  <text x="20" y="401" class="ui" font-size="10" fill="#5C5C72">codefre.sh  &#xB7;  May 10</text>

  <text x="20" y="426" class="ui" font-size="12" fill="#7A7A94">Docker build optimization</text>
  <text x="20" y="441" class="ui" font-size="10" fill="#5C5C72">derobot.is  &#xB7;  May 9</text>

  <text x="20" y="466" class="ui" font-size="12" fill="#7A7A94">Tailwind dark mode setup</text>
  <text x="20" y="481" class="ui" font-size="10" fill="#5C5C72">aifighter.com  &#xB7;  May 8</text>

  <!-- ==================== THREAD HEADER (64px) ==================== -->
  <rect x="220" y="56" width="1060" height="64" fill="#0F0F14"/>
  <line x1="220" y1="120" x2="1280" y2="120" stroke="#2A2A3A" stroke-width="1"/>

  <!-- Project badge pill -->
  <rect x="240" y="68" width="84" height="22" rx="11" fill="rgba(6,182,212,0.15)"/>
  <text x="282" y="83" class="mono" font-size="11" font-weight="500" fill="#06B6D4" text-anchor="middle">codefre.sh</text>

  <!-- Title -->
  <text x="336" y="83" class="ui" font-size="16" font-weight="500" fill="#EDEDF4">Setting up Phoenix LiveView authentication flow</text>

  <!-- Meta line -->
  <text x="240" y="106" class="ui" font-size="12" fill="#5C5C72">38 messages  &#xB7;  claude-opus-4-7  &#xB7;  May 10, 2026</text>

  <!-- Action buttons (ghost style) -->
  <text x="1030" y="83" class="ui" font-size="13" fill="#7A7A94">Edit</text>
  <text x="1080" y="83" class="ui" font-size="13" fill="#7A7A94">Convert</text>
  <text x="1145" y="83" class="ui" font-size="13" fill="#7A7A94">Tag</text>
  <text x="1185" y="83" class="ui" font-size="13" fill="#7A7A94">Archive</text>

  <!-- ==================== METADATA PANEL (right, 260px) ==================== -->
  <rect x="1020" y="120" width="260" height="680" fill="#18181F"/>
  <line x1="1020" y1="120" x2="1020" y2="800" stroke="#2A2A3A" stroke-width="1"/>

  <!-- Tags section -->
  <text x="1040" y="156" class="ui" font-size="11" font-weight="600" fill="#5C5C72" letter-spacing="0.5">TAGS</text>
  <!-- tag pills -->
  <rect x="1040" y="166" width="44" height="24" rx="4" fill="#22222E"/>
  <text x="1062" y="182" class="ui" font-size="12" fill="#9898B0" text-anchor="middle">auth</text>
  <rect x="1092" y="166" width="64" height="24" rx="4" fill="#22222E"/>
  <text x="1124" y="182" class="ui" font-size="12" fill="#9898B0" text-anchor="middle">phoenix</text>

  <!-- Summary section -->
  <text x="1040" y="226" class="ui" font-size="11" font-weight="600" fill="#5C5C72" letter-spacing="0.5">SUMMARY</text>
  <text x="1040" y="246" class="ui" font-size="13" fill="#7A7A94">
    <tspan x="1040" dy="0">Set up phx_gen_auth with</tspan>
    <tspan x="1040" dy="18">email/password login, session</tspan>
    <tspan x="1040" dy="18">management, and LiveView auth</tspan>
    <tspan x="1040" dy="18">flows for the codefre.sh backend.</tspan>
  </text>

  <!-- Token Usage section -->
  <text x="1040" y="344" class="ui" font-size="11" font-weight="600" fill="#5C5C72" letter-spacing="0.5">TOKENS</text>
  <text x="1040" y="366" class="mono" font-size="13" fill="#7A7A94">Input:      12,847</text>
  <text x="1040" y="386" class="mono" font-size="13" fill="#7A7A94">Output:      4,231</text>
  <text x="1040" y="406" class="mono" font-size="13" fill="#7A7A94">Cache read:  8,102</text>

  <!-- Session section -->
  <text x="1040" y="454" class="ui" font-size="11" font-weight="600" fill="#5C5C72" letter-spacing="0.5">SESSION</text>
  <text x="1040" y="476" class="mono" font-size="12" fill="#5C5C72">ID: a3f2...8e91</text>
  <text x="1040" y="496" class="mono" font-size="12" fill="#5C5C72">Branch: feat/auth</text>

  <!-- ==================== MESSAGE LIST (left of metadata panel) ==================== -->
  <!-- Message area: x=220 to x=1020, y=120 to y=800 => 800px wide, 680px tall -->

  <!-- MESSAGE 1 — USER -->
  <text x="244" y="152" class="ui" font-size="11" font-weight="600" fill="#5C5C72" letter-spacing="0.8">USER</text>
  <!-- Message card -->
  <rect x="240" y="160" width="760" height="64" rx="4" fill="#18181F"/>
  <!-- Left accent border -->
  <rect x="240" y="160" width="2" height="64" rx="1" fill="#06B6D4"/>
  <!-- Message text -->
  <text x="260" y="182" class="mono" font-size="13" fill="#CDCDE0">
    <tspan x="260" dy="0">I need to add authentication to the Phoenix LiveView app. Should use</tspan>
    <tspan x="260" dy="18">phx_gen_auth. Can you set it up with email/password and add session</tspan>
    <tspan x="260" dy="18">management?</tspan>
  </text>

  <!-- MESSAGE 2 — ASSISTANT -->
  <text x="244" y="256" class="ui" font-size="11" font-weight="600" fill="#5C5C72" letter-spacing="0.8">ASSISTANT</text>

  <!-- Collapsed thinking block -->
  <rect x="240" y="264" width="760" height="28" rx="4" fill="transparent"/>
  <text x="260" y="283" class="ui" font-size="13" fill="#5C5C72">
    <tspan fill="#5C5C72">&#x25B8;</tspan>
    <tspan dx="6" font-style="italic">thinking</tspan>
  </text>

  <!-- Response text -->
  <text x="260" y="312" class="mono" font-size="13" fill="#9898B0">
    <tspan x="260" dy="0">I'll set up phx_gen_auth for email/password authentication. This will</tspan>
    <tspan x="260" dy="18">generate the accounts context, user schema, and LiveView auth flows.</tspan>
    <tspan x="260" dy="18">Let me start by running the generator.</tspan>
  </text>

  <!-- Collapsed tool call -->
  <rect x="240" y="362" width="760" height="32" rx="6" fill="#18181F" stroke="#2A2A3A" stroke-width="1"/>
  <text x="260" y="383" font-size="12">
    <tspan class="ui" fill="#5C5C72">&#x25B8;</tspan>
    <tspan dx="6" class="mono" fill="#06B6D4">Bash</tspan>
    <tspan dx="10" class="mono" fill="#7A7A94">mix phx.gen.auth Accounts User users</tspan>
  </text>

  <!-- MESSAGE 3 — TOOL RESULT -->
  <text x="244" y="424" class="ui" font-size="11" font-weight="600" fill="#5C5C72" letter-spacing="0.8">TOOL RESULT</text>
  <rect x="240" y="432" width="760" height="80" rx="4" fill="#18181F"/>
  <text x="260" y="454" class="mono" font-size="12" fill="#7A7A94">
    <tspan x="260" dy="0">* creating lib/app_web/live/user_login_live.ex</tspan>
    <tspan x="260" dy="17">* creating lib/app_web/live/user_registration_live.ex</tspan>
  </text>
  <!-- More lines indicator -->
  <text x="260" y="498" class="ui" font-size="12" fill="#5C5C72">
    <tspan>&#x25B8;</tspan>
    <tspan dx="4">14 more lines</tspan>
  </text>

  <!-- MESSAGE 4 — ASSISTANT (follow-up) -->
  <text x="244" y="544" class="ui" font-size="11" font-weight="600" fill="#5C5C72" letter-spacing="0.8">ASSISTANT</text>
  <text x="260" y="568" class="mono" font-size="13" fill="#9898B0">
    <tspan x="260" dy="0">The generator created the auth modules. Now I need to run the migration</tspan>
    <tspan x="260" dy="18">and update the router. Let me also add the session plugs to the endpoint.</tspan>
  </text>

  <!-- Collapsed tool call for message 4 -->
  <rect x="240" y="598" width="760" height="32" rx="6" fill="#18181F" stroke="#2A2A3A" stroke-width="1"/>
  <text x="260" y="619" font-size="12">
    <tspan class="ui" fill="#5C5C72">&#x25B8;</tspan>
    <tspan dx="6" class="mono" fill="#06B6D4">Bash</tspan>
    <tspan dx="10" class="mono" fill="#7A7A94">mix ecto.migrate</tspan>
  </text>

  <!-- Scroll indicator at bottom of message list -->
  <rect x="600" y="770" width="80" height="6" rx="3" fill="#2A2A3A"/>

</svg>