<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <title>Claude Assist</title>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Simplified mark for small sizes -->
  <rect x="4" y="7" width="18" height="6" rx="1" fill="#CDCDE0"/>
  <rect x="6" y="16" width="14" height="6" rx="1" fill="#8888A0"/>
  <polygon points="26,22 23,25 26,28 29,25" fill="#06B6D4" filter="url(#glow)"/>
</svg>