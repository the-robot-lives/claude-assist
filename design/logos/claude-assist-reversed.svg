<svg xmlns="http://www.w3.org/2000/svg" width="320" height="48" viewBox="0 0 320 48">
  <title>Claude Assist — Reversed</title>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Mark (reversed for light backgrounds) -->
  <g transform="translate(0, 4)">
    <rect x="2" y="8" width="26" height="8" rx="1" fill="#18181F"/>
    <rect x="5" y="19" width="20" height="8" rx="1" fill="#18181F" opacity="0.55"/>
    <polygon points="36,26 32,30 36,34 40,30" fill="#0891B2" filter="url(#glow)"/>
  </g>
  <!-- Wordmark (reversed) -->
  <text x="56" y="31" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="22" letter-spacing="0.02em" fill="#18181F">claude-assist</text>
</svg>